[mypy]
strict = True
python_version = 3.13
# Run mypy from the project root so that the `backend` package is resolvable.
mypy_path = ..

# Third-party packages that ship without py.typed markers on CPython 3.13.
# Each override is scoped to the specific package so strict checking is
# preserved for all our own source files.
[mypy-shapely.*]
ignore_missing_imports = True

[mypy-rasterio.*]
ignore_missing_imports = True

[mypy-affine.*]
ignore_missing_imports = True

[mypy-google.cloud.*]
ignore_missing_imports = True

[mypy-google.genai.*]
ignore_missing_imports = True
